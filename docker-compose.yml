name: "proyect-GBD"
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=skilltree_db
    volumes:
      - mongo_data:/data/db
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    ports:
      - "7474:7474" # Interfaz web
      - "7687:7687" # Conexión Bolt (Java/spring)
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data

volumes:
  mongo_data:
  neo4j_data:

